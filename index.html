<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PELMEN CONNECT</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <audio id="remote-audio" autoplay playsinline style="display:none;"></audio>

    <div id="sidebar">
        <div class="sidebar-header">🥟 PELMEN CONNECT</div>
        <div style="padding: 10px; display: flex; flex-direction: column; gap: 8px;">
            <input type="text" id="room-id" placeholder="Код комнаты...">
            <input type="text" id="nickname" placeholder="Твой Ник...">
            <button onclick="join()" class="btn-join">ВОЙТИ</button>
            <button onclick="logout()" class="btn-logout">ВЫЙТИ</button>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="main">
        <header>
            <button onclick="backToList()" id="back-btn" style="display:none; margin-right:10px;">⬅</button>
            <span id="chat-target">ОБЩИЙ ЧАТ</span> 
        </header>
        <div id="chat"></div>
        <div class="footer">
            <label for="file-input" style="cursor:pointer; font-size: 24px;">🖼️</label>
            <input type="file" id="file-input" accept="image/*,video/*" style="display:none" onchange="sendFile()">
            <button id="record-btn" style="font-size: 24px;">🎤</button> 
            <input type="text" id="inp" placeholder="Сообщение..." onkeypress="if(event.key === 'Enter') send()">
            <button onclick="send()" id="send-btn">➤</button>
        </div>
    </div>

    <div id="call-screen" style="display:none;">
        <div class="call-box">
            <h2 id="call-status">📞 Звонок...</h2>
            <h3 id="caller-name">...</h3>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button id="answer-btn" onclick="answerCall()" style="background:#28a745; color:white; padding:10px 20px; border-radius:10px; display:none;">ОТВЕТИТЬ</button>
                <button onclick="endCall()" style="background:#dc3545; color:white; padding:10px 20px; border-radius:10px;">СБРОСИТЬ</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
